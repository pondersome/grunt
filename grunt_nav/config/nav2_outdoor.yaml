# Nav2 outdoor GPS waypoint following configuration for Grunt
#
# Based on nav2_gps_waypoint_follower_demo's nav2_no_map_params.yaml
# Customized for Pioneer 3-AT skid-steer with RTK GPS localization.
#
# Phase 1: Open-space GPS waypoint following (done).
# Phase 2: Sonar-driven obstacle awareness (done 2026-04-22):
#            - collision_monitor with /grunt1/sonar/cloud feeds reactive
#              cmd_vel gating (FootprintStop + FootprintApproach polygons)
#            - ObstacleLayer on local_costmap with the same cloud for
#              costmap-side marks and cost-regulated RPP slowdown
#          RangeSensorLayer (per-Range-topic pathway) was tried and
#          abandoned — see memory/project_sonar_costmap_investigation.md.
# Phase 3 (future): Add voxel_layer on local costmap for 3D LiDAR.
#
# Namespace templating: the literal `grunt1` in this file is a
# placeholder. nav2.launch.py uses nav2_common.launch.ReplaceString to
# substitute it with the actual `prefix` launch argument at runtime.
# This lets the same config work for grunt1, grunt2, etc. without
# editing the file. If you add new frame IDs or topic paths that
# include the robot namespace, write them with `grunt1` and the
# launch-time substitution will handle the rest.

bt_navigator:
  ros__parameters:
    global_frame: grunt1/map
    robot_base_frame: grunt1/base_link
    odom_topic: /grunt1/odometry/local
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 5
    # 0.1s was too tight: Foxglove 3D panel publishes goals with the
    # current timestamp, and under CPU pressure the global EKF's
    # map->odom TF publish can lag ~50-100ms. That caused
    # "Failed to transform goal pose" on every click even though the
    # transform WAS available a moment later. 0.5s gives the TF buffer
    # room to interpolate without masking real tree problems.
    transform_tolerance: 0.5
    # Use built-in default BT and plugin list
    # Explicit plugin_lib_names omitted to avoid duplicate registration
    # errors with nav2_bringup's own plugin loading on Jazzy

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    # global_frame_id must match the global EKF's world_frame.
    # The launch file overrides this with the namespaced frame.
    global_frame_id: grunt1/map
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      waypoint_pause_duration: 0  # ms to pause at each waypoint

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 0.8]      # [vx, vy, vw] — match grunt limits
    min_velocity: [-0.3, 0.0, -0.8]
    max_accel: [1.0, 0.0, 1.5]
    max_decel: [-1.0, 0.0, -1.5]
    odom_topic: "/grunt1/odometry/local"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true  # ESSENTIAL for outdoor — plan through unseen space

controller_server:
  ros__parameters:
    controller_frequency: 10.0  # reduced from 20 for CPU-constrained NUC
    # Default 0.3s assumes a costmap updating at 5+ Hz. Bumped to 1.0s
    # so it comfortably covers a 3Hz (333ms) local costmap update
    # period plus any jitter. Prevents "Costmap timed out waiting for
    # update" aborts the instant a goal arrives.
    costmap_update_timeout: 3.0 # todo lower this
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 20.0
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.6    # Must be < min_lookahead_dist (0.8) to avoid
                                # RPP's carrot-within-tolerance rotate trap. At
                                # 0.6m this is ~1.5x our F9P non-RTK h_acc
                                # (~0.3-0.4m). See
                                # project_supervisor_threshold_refactor.md for
                                # the auto-derivation backlog.
      yaw_goal_tolerance: 0.25  # ~14 degrees
    # Using Regulated Pure Pursuit instead of MPPI for Phase 1.
    # RPP is much lighter on CPU — critical for the quad-core NUC
    # which is already loaded with EKFs, GPS, IMU, and teleop.
    # MPPI can be revisited when running rviz on the desktop.
    #
    # Tuning round 2026-05-01 — bumped operating envelope to 1.0 m/s
    # forward and π rad/s in-place rotation; turned on velocity-scaled
    # lookahead. See ponderdocs/nav/docs/rpp_controller_explained.md
    # for the geometric rationale and the 2026-05-01 mission analysis
    # for the data driving these changes.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      # ─── speed envelope ────────────────────────────────────────────
      # 0.3 → 1.0 m/s. The 0.3 cap was a Phase 1 safety throttle while
      # we shook out localization and recovery. With the 2026-05-01
      # missions clean (datum aligned, EKF tracking GPS to ~25cm
      # median), we can lift toward operational speed. Pioneer 3-AT
      # firmware ceiling is 1.5 m/s; 1.0 leaves margin for the
      # regulated scaling to slow on tight curves.
      desired_linear_vel: 1.0
      # ─── lookahead — now velocity-scaled ───────────────────────────
      # use_velocity_scaled_lookahead_dist=true makes
      #   L = clamp(v * lookahead_time, min, max)
      # which keeps time-to-carrot ≈ constant across speeds. This is
      # essential at higher speeds: with fixed lookahead, K=2v/L grows
      # linearly with v, so S-turn oscillation gets WORSE faster than
      # speed grows. Velocity-scaling holds K nearly constant.
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.5
      # When velocity-scaled, lookahead_dist is the fallback used only
      # if scaling somehow can't compute. Set close to the nominal
      # operating value (v=1.0 → L=1.5).
      lookahead_dist: 1.5
      # min/max bracket the velocity-scaled lookahead. At low speed
      # (e.g., during regulated curvature scaling that slows v), L
      # clamps to min_lookahead_dist=0.8m. xy_goal_tolerance MUST stay
      # below this floor to avoid RPP's "carrot inside tolerance ring
      # → rotate-only" trap (was the 260415-200304 bug).
      # At high speed (1.5 m/s), velocity-scaled L=2.25m clamps to
      # max=2.5m — leaves headroom if we lift further toward firmware
      # max in future tuning rounds.
      min_lookahead_dist: 0.8
      max_lookahead_dist: 2.5
      # ─── in-place rotation ─────────────────────────────────────────
      # 0.6 → π rad/s top angular velocity during rotate-to-heading.
      # The kinematic decel formula in rotateToHeading() ensures we
      # ramp down to zero at the target angle, so π is only achieved
      # when the angle to turn is large enough (> ~88° at the new
      # max_angular_accel). For smaller turns, the sqrt(2·α·|θ|)
      # ceiling kicks in first.
      rotate_to_heading_angular_vel: 3.14159
      use_rotate_to_heading: true
      # ─── slew-rate limit on omega ──────────────────────────────────
      # Was 1.5 (chosen earlier as a damping aid for S-turns). With
      # rotate_to_heading_angular_vel=π, we need higher max_angular_
      # accel so the in-place rotation can ramp to π in ~1s instead of
      # ~2s. 3.2 (Nav2 default) gives π/3.2 ≈ 0.98s ramp. Forward
      # driving's S-turn damping now relies on the longer lookahead
      # (smaller K) rather than slew limiting.
      max_angular_accel: 3.2
      # ─── unchanged below ───────────────────────────────────────────
      transform_tolerance: 0.1
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: false
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      # Turned on 2026-04-21 when RangeSensorLayer was added to local
      # costmap. Makes RPP slow desired_linear_vel as marked costmap
      # cells approach the lookahead point — works with the existing
      # regulated_linear_scaling_min_radius / _min_speed thresholds.
      use_cost_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      allow_reversing: false
      max_robot_pose_search_dist: 10.0

behavior_server:
  ros__parameters:
    # Frame names — without these explicit, behavior_server defaults to
    # unprefixed "odom" / "map" / "base_link", which don't exist in our
    # namespaced TF tree. Manifests as "Current robot pose is not available"
    # on any spin/backup/drive_on_heading recovery.
    local_frame: grunt1/odom
    global_frame: grunt1/map
    robot_base_frame: grunt1/base_link
    transform_tolerance: 0.1
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"

# Global costmap: rolling window, no static map, sonar-aware.
# Phase 2 (initial): inflation only. Phase 3 (planned): voxel_layer
# for 3D LiDAR.
# Phase 2.5 (2026-04-25): added obstacle_layer with sonar so that
# RPP's planner produces routes AROUND obstacles. Without it the
# planner emits a straight-line path on every re-issue, and after a
# collision_monitor-triggered EscapeSequence the new path passes
# through the same physical obstacle (only laterally shifted by the
# escape's small drive). With obstacle_layer the planner sees the
# obstacle and reroutes properly. observation_persistence is much
# longer than the local costmap's (30s vs 3s) so the obstacle stays
# visible across the planner's 1Hz call cadence and the multi-second
# escape sequence — and raytracing naturally clears marks as the
# robot moves past them.
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: grunt1/map
      robot_base_frame: grunt1/base_link
      robot_radius: 0.25
      resolution: 0.5
      track_unknown_space: true
      rolling_window: true
      width: 400
      height: 400
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: "sonar_cloud"
        sonar_cloud:
          topic: /grunt1/sonar/cloud
          data_type: "PointCloud2"
          # Sonar cloud points come in base_link frame (per p2os_driver
          # config). Same as the local costmap's obstacle_layer
          # configuration.
          sensor_frame: grunt1/base_link
          marking: true
          clearing: true
          obstacle_max_range: 5.0
          obstacle_min_range: 0.15
          raytrace_max_range: 5.5
          raytrace_min_range: 0.15
          min_obstacle_height: -0.1
          max_obstacle_height: 1.0
          expected_update_rate: 10.0
          inf_is_valid: false
          # Long persistence so the planner sees an obstacle long
          # enough to reroute around it, even across the multi-second
          # EscapeSequence cycle. Raytracing handles natural decay
          # as the robot moves past obstacles.
          observation_persistence: 30.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true

# Collision monitor: FootprintApproach polygon fed by the sonar
# PointCloud2 (added 2026-04-21). Phase 3 will add LiDAR observation
# sources and potentially more polygons (stop, slowdown) for layered
# response.
collision_monitor:
  ros__parameters:
    base_frame_id: grunt1/base_link
    odom_frame_id: grunt1/odom
    # Collision_monitor sits between controller_server and twist_mux:
    #   controller → /grunt1/cmd_vel_nav_raw (input)
    #   polygons gate → /grunt1/cmd_vel_nav (output, twist_mux consumes)
    # These topic names are remapped by nav2.launch.py, but listing them
    # here keeps the YAML self-documenting.
    cmd_vel_in_topic: cmd_vel_in
    cmd_vel_out_topic: cmd_vel_out
    state_topic: collision_monitor_state
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintStop", "FootprintApproach"]
    # Hard-stop zone: if even a single sonar point lands inside an
    # inflated footprint polygon, cut cmd_vel to zero immediately.
    # This is the true "virtual bumper" — catches the case where an
    # obstacle is directly in front and close enough that predictive
    # scaling (FootprintApproach below) would still let the robot
    # coast into it before sensors go dead (~0.15m min_range).
    FootprintStop:
      type: "polygon"
      action_type: "stop"
      # Forward edge at 0.55m — pushes the stop trigger out past the
      # deceleration envelope. At 0.3 m/s commanded, RPP's regulated
      # approach brings us to ~0.15 m/s near the polygon edge; allowing
      # ~0.15m of stopping distance from that speed means forward hit
      # detected at 0.55m, robot comes to rest at ~0.40m. That's where
      # sensor 4's min_range (0.15m) starts being a problem in base_link
      # frame (0.24 + 0.15 = 0.39m) — so stopping at ~0.40m keeps the
      # obstacle *just* inside sensor reach where persistence can
      # continue to refresh if it does show up again.
      # Side/rear edges inflate chassis by ~7cm for clearance margin.
      points: "[[0.55, 0.32], [0.55, -0.32], [-0.32, -0.32], [-0.32, 0.32]]"
      min_points: 1
      visualize: true
      enabled: true
    # Predictive slowdown zone: scale cmd_vel down as time-to-collision
    # shortens, along the projected footprint path. This catches
    # obstacles that are further out but on-course, giving the robot
    # a chance to decelerate smoothly before FootprintStop engages.
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: local_costmap/published_footprint
      time_before_collision: 2.0
      simulation_time_step: 0.1
      # Sonar clouds are sparse (max 16 points total, usually 3-5 in
      # any given polygon projection). 1 point is enough to act on.
      min_points: 1
      visualize: false
      enabled: true
    # Sonar PointCloud2 as the observation source. The sonar fan-out
    # in p2os_driver publishes /grunt1/sonar/cloud at the SIP rate
    # (~10 Hz) with one point per live echo in base_link frame.
    # collision_monitor uses this with the FootprintApproach polygon
    # above to react to near hits faster than the 5 Hz local costmap
    # updates can — critical for teleop-speed approach to an obstacle.
    observation_sources: ["sonar_cloud"]
    sonar_cloud:
      type: "pointcloud"
      topic: "/grunt1/sonar/cloud"
      min_height: -0.1   # sonars mount at z=0.25m; filter any floor bounces
      max_height: 1.0
      # Persistence covers the sensor dead zone (< 0.15m) during
      # approach — the last pre-deadzone echo gets held long enough
      # for the footprint polygon to sweep over it while the robot
      # finishes decelerating. Don't overload this to also do
      # "keep the robot stopped after contact" — that belongs at
      # the behavior layer as an explicit escape branch (Phase D /
      # backlog: grunt_behaviors BT subtree watching
      # collision_monitor_state), not by tuning persistence up to
      # outlast progress_checker.
      observation_persistence: 3.0
      enabled: true

# Note: docking_server and lifecycle_manager_navigation are configured
# directly in nav2.launch.py, not here. The launch file controls which
# nodes are managed (docking_server is excluded).

# Local costmap: rolling window with sonar-driven obstacle layer
# (added 2026-04-21). Phase 3 will add voxel_layer for 3D LiDAR alongside.
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: grunt1/odom
      robot_base_frame: grunt1/base_link
      robot_radius: 0.25
      resolution: 0.05
      rolling_window: true
      # 6 m square rolling window. Sonar max range is 5 m, so 6 m gives
      # full sensor reach with a small margin. Will clip the high end of
      # what 3D LiDAR and depth camera eventually contribute — revisit
      # when those are integrated and we know real-world useful ranges.
      # Sonar doesn't see mast-height cantilevered obstacles (e.g. table
      # overhangs) — the LiDAR / depth path is the real answer there.
      width: 6
      height: 6
      # obstacle_layer consumes the sonar PointCloud2 directly (simpler
      # than RangeSensorLayer's per-topic mess). Critically: it marks
      # current_=true on each observation, which is what rescues the
      # costmap from the clear_entirely_local_costmap trap that
      # otherwise leaves an inflation-only costmap permanently stuck
      # non-current after a BT recovery runs (bug documented in
      # memory/project_sonar_costmap_investigation.md).
      #
      # RangeSensorLayer (per-sensor Range topics) was tried and
      # abandoned — see the same memory file.
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: "sonar_cloud"
        sonar_cloud:
          topic: /grunt1/sonar/cloud
          data_type: "PointCloud2"
          # Our cloud publishes points in base_link frame (not per-sensor
          # frame). Raytracing is slightly lossy as a result — clears
          # go from robot-center rather than the actual transducer, but
          # accuracy is fine for bumper-distance obstacle awareness.
          sensor_frame: grunt1/base_link
          marking: true
          clearing: true
          obstacle_max_range: 5.0
          obstacle_min_range: 0.15
          raytrace_max_range: 5.5
          raytrace_min_range: 0.15
          min_obstacle_height: -0.1
          max_obstacle_height: 1.0
          expected_update_rate: 10.0
          inf_is_valid: false
          # Same purpose as collision_monitor's observation_persistence —
          # keep marks alive after the obstacle enters the sonar dead
          # zone (< 0.15m) so the cells stay painted until the robot
          # moves away. Also means clear_entirely_local_costmap
          # recoveries won't leave the costmap stuck non-current for
          # longer than this.
          observation_persistence: 3.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55
      always_send_full_costmap: true
